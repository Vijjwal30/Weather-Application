name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Gluon GraalVM
        uses: gluonhq/setup-graalvm@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java (Temurin for Maven)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libgl-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            libxtst-dev

      - name: Show Environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "GRAALVM_HOME=$GRAALVM_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version
          javac -version
          mvn -version

      - name: Print Dependency Tree
        run: mvn dependency:tree || true

      - name: Package Artifact
        run: mvn -Pandroid gluonfx:build gluonfx:package
        env:
          GRAALVM_HOME: ${{ env.GRAALVM_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-package
          path: target/gluonfx/**/gvm/*.apk
