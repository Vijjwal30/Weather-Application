name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Setup GraalVM
        uses: gluonhq/setup-graalvm@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux Libraries
        run: |
          sudo apt-get update

          sudo apt-get install -y \
          libasound2-dev \
          libavcodec-dev \
          libavformat-dev \
          libavutil-dev \
          libgl-dev \
          libgtk-3-dev \
          libpango1.0-dev \
          libxtst-dev

      - name: Show Version
        run: |
              java -version
              javac -version
              mvn -version

      - name: Build Android
        run: |
          mvn -Pandroid \
          clean \
          gluonfx:build \
          gluonfx:package

      - name: Upload APK
        uses: actions/upload-artifact@v4

        with:
          name: android-build
          path: target/gluonfx/**/gvm/*