name: Android Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK for ${{ matrix.arch }}
    # Dynamically schedules a native x86 machine or native ARM machine based on the target
    runs-on: ${{ matrix.os-runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os-runner: ubuntu-latest
          - arch: aarch64
            os-runner: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Gluon GraalVM
        uses: gluonhq/setup-graalvm@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libavcodec-dev \
            libavformat-dev \
            libavutil-dev \
            libgl-dev \
            libgtk-3-dev \
            libpango1.0-dev \
            libxtst-dev

      - name: Configure Android SDK
        run: |
          echo "ANDROID_HOME=/home/runner/.gluon/substrate/Android" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=/home/runner/.gluon/substrate/Android" >> $GITHUB_ENV

      - name: Show Environment
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          echo "GRAALVM_HOME=$GRAALVM_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          java -version
          javac -version
          mvn -version

      # Modified: Injects the dynamic target architecture via the command line argument
      - name: Package Artifact
        run: mvn -e -X -Pandroid gluonfx:build gluonfx:package -Dgluonfx.targetArch=${{ matrix.arch }}
        env:
          GRAALVM_HOME: ${{ env.GRAALVM_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # Modified: Appends the architecture name so separate APK files are produced
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-package-${{ matrix.arch }}
          path: target/gluonfx/**/gvm/*.apk

      # Modified: Modified paths below to ensure distinct files remain separate on the dashboard
      - name: List Generated Files
        if: always()
        run: |
          echo "===== TARGET ====="
          find target -type f 2>/dev/null | sort || true

      - name: Upload Full Target Directory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: target-directory-${{ matrix.arch }}
          path: target

      - name: Upload Gluon Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gluon-logs-${{ matrix.arch }}
          path: |
            target/**/*.log
            target/**/log/**
            target/**/*.txt
            target/**/*.args
            target/**/*.json
